name: Track CF Pages Deployment

on:
  push:
    branches: [main]

jobs:
  deployment:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Create GitHub deployment
        id: deploy
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'Production',
              auto_merge: false,
              required_contexts: [],
              description: 'Cloudflare Pages',
            });
            return deployment.data.id;
          result-encoding: string

      - name: Wait for CF Pages check to complete
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.deploy.outputs.result }};
            // Wait up to 3 minutes for CF Pages check run to finish
            for (let i = 0; i < 18; i++) {
              await new Promise(r => setTimeout(r, 10000));
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                app_id: 58341, // Cloudflare Workers and Pages app
              });
              const cf = checks.check_runs.find(r => r.name === 'Cloudflare Pages');
              if (!cf || cf.status !== 'completed') continue;

              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deploymentId,
                state: cf.conclusion === 'success' ? 'success' : 'failure',
                environment_url: 'https://mtg-rounder.pages.dev',
                description: 'Cloudflare Pages',
              });
              return;
            }
            // Timed out — mark as success anyway (CF likely deployed fine)
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: 'https://mtg-rounder.pages.dev',
              description: 'Cloudflare Pages',
            });
