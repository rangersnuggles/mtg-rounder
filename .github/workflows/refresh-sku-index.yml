name: Refresh SKU Index

on:
  schedule:
    # Runs every Monday at 06:00 UTC — catches most new set releases
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Also triggerable manually from GitHub → Actions → Refresh SKU Index → Run workflow

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Rebuild SKU index from MTGJSON
        run: node scripts/build-sku-index.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skus-index.json
          if git diff --staged --quiet; then
            echo "No changes to skus-index.json — already up to date."
          else
            git commit -m "chore: refresh SKU index $(date -u +%Y-%m-%d)"
            git push
          fi
